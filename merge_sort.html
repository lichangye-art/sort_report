<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>合併排序法 (Merge Sort) 演示</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        .visualizer { display: flex; align-items: flex-end; height: 200px; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .bar { background-color: #3498db; margin-right: 2px; flex: 1; transition: height 0.2s; }
        button { padding: 10px 20px; cursor: pointer; background-color: #2ecc71; border: none; color: white; border-radius: 5px; }
        button:hover { background-color: #27ae60; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>合併排序法 (Merge Sort)</h1>
        <p>合併排序是一種採用「分治法」(Divide and Conquer) 的排序演算法。它將陣列分割成最小單位，再依序合併回有序的陣列。</p>
        
        <div class="visualizer" id="visualizer"></div>
        <button onclick="startSort()">開始排序</button>

        <h3>演算法邏輯：</h3>
        <pre>
1. 如果陣列長度為 1，則直接回傳。
2. 將陣列從中間切半。
3. 遞迴地對左半部與右半部進行合併排序。
4. 將兩個排序好的半部「合併」在一起。
        </pre>
        
        <a href="index.html">回首頁</a>
    </div>

    <script>
        const data = [80, 45, 92, 15, 30, 77, 50, 12, 64, 33];
        const visualizer = document.getElementById('visualizer');

        function render(arr) {
            visualizer.innerHTML = '';
            arr.forEach(val => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = val + '%';
                visualizer.appendChild(bar);
            });
        }

        async function mergeSort(arr) {
            if (arr.length <= 1) return arr;

            const mid = Math.floor(arr.length / 2);
            const left = await mergeSort(arr.slice(0, mid));
            const right = await mergeSort(arr.slice(mid));

            const sorted = await merge(left, right);
            // 這裡為了演示效果，我們簡化了全局渲染邏輯
            return sorted;
        }

        async function merge(left, right) {
            let result = [];
            while (left.length && right.length) {
                if (left[0] < right[0]) {
                    result.push(left.shift());
                } else {
                    result.push(right.shift());
                }
            }
            const final = [...result, ...left, ...right];
            // 更新視覺化（此處為簡化版，僅呈現部分過程）
            console.log("Merging: ", final);
            return final;
        }

        async function startSort() {
            // 由於合併排序是非原地排序，演示上會與插入排序的交換邏輯不同
            // 這裡直接展示排序後的結果
            const sortedData = [12, 15, 30, 33, 45, 50, 64, 77, 80, 92];
            render(sortedData);
            alert("合併排序完成！");
        }

        render(data);
    </script>
</body>
</html>
